<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Home — Server Status</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0c0f;
      --surface: #13151a;
      --border: #1f2229;
      --green: #00f5a0;
      --green-dim: rgba(0, 245, 160, 0.08);
      --green-glow: rgba(0, 245, 160, 0.25);
      --text: #e8eaf0;
      --muted: #555b6e;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Glow orb */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 245, 160, 0.06) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50%       { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Status pill */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--green-dim);
      border: 1px solid rgba(0, 245, 160, 0.2);
      border-radius: 999px;
      padding: 0.3rem 0.9rem;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--green);
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 1.4s ease-in-out infinite;
      box-shadow: 0 0 6px var(--green);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    h1 {
      font-family: var(--sans);
      font-size: clamp(2.4rem, 6vw, 3.4rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      color: var(--text);
    }

    h1 span {
      color: var(--green);
      text-shadow: 0 0 30px var(--green-glow);
    }

    .subtitle {
      font-family: var(--mono);
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .subtitle em {
      color: rgba(0, 245, 160, 0.6);
      font-style: normal;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin-bottom: 2.5rem;
    }

    /* Nav */
    nav {
      display: flex;
      gap: 0.75rem;
    }

    nav a {
      font-family: var(--mono);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-decoration: none;
      padding: 0.55rem 1.2rem;
      border-radius: 3px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: var(--surface);
      transition: color 0.2s, border-color 0.2s, background 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    nav a::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--green-dim);
      opacity: 0;
      transition: opacity 0.2s;
    }

    nav a:hover {
      color: var(--green);
      border-color: rgba(0, 245, 160, 0.3);
      box-shadow: 0 0 14px rgba(0, 245, 160, 0.1);
    }

    nav a:hover::after { opacity: 1; }

    nav a.active {
      color: var(--green);
      border-color: rgba(0, 245, 160, 0.35);
      background: var(--green-dim);
    }

    /* Timestamp */
    .meta {
      margin-top: 2.5rem;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .meta span { color: rgba(0, 245, 160, 0.4); }
  </style>
</head>
<body>
  <div class="container">
    <div class="status-pill">
      <span class="dot"></span>
      OPERATIONAL
    </div>

    <h1>Server is<br><span>Running.</span></h1>

    <p class="subtitle">
      If you can see this page, all systems are online.<br>
      <em>HTTP 200</em> — connection established successfully.
    </p>

    <div class="divider"></div>

    <nav>
      <a href="/" class="active">/ home</a>
      <a href="/about.html">/ about</a>
    </nav>

    <p class="meta">uptime <span id="uptime">00:00:00</span> &nbsp;·&nbsp; <span id="ts"></span></p>
  </div>

  <script>
    const start = Date.now();

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const now = new Date();
      document.getElementById('ts').textContent =
        `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ` +
        `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

      const elapsed = Math.floor((Date.now() - start) / 1000);
      const h = Math.floor(elapsed / 3600);
      const m = Math.floor((elapsed % 3600) / 60);
      const s = elapsed % 60;
      document.getElementById('uptime').textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
